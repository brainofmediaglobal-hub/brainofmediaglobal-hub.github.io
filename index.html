<!DOCTYPE html>
<html lang="tr" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOF MEDIA | Premium Dijital Ajans</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { 
            bofBg: '#050816', 
            bofPrimary: '#3B5FFF', 
            bofMuted: '#8A90A5' 
          },
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          animation: { 'subtle-float': 'float 6s ease-in-out infinite' },
          keyframes: { 
            float: { 
              '0%, 100%': { transform: 'translateY(0px)' }, 
              '50%': { transform: 'translateY(-8px)' } 
            } 
          }
        }
      }
    }
  </script>

  <!-- ES Modules Import Map (Modern React ve Framer Motion için) -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "framer-motion": "https://esm.sh/framer-motion@10.16.4"
      }
    }
  </script>

  <!-- Babel (Tarayıcıda React Derleyicisi) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Tipografi: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    body { 
      font-family: 'Inter', sans-serif; 
      background-color: #050816; 
      color: #ffffff; 
      overflow-x: hidden; 
    }
    /* Premium Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #050816; }
    ::-webkit-scrollbar-thumb { background: #1a1f3c; border-radius: 10px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- UYGULAMA KODLARI (React & Framer Motion) -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { motion } from 'framer-motion';

    // ==========================================
    // 1. NAVBAR BİLEŞENİ
    // ==========================================
    const Navbar = () => {
      const [scrolled, setScrolled] = useState(false);
      useEffect(() => {
        const handleScroll = () => setScrolled(window.scrollY > 20);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      return (
        <motion.nav 
          initial={{ y: -20, opacity: 0 }} 
          animate={{ y: 0, opacity: 1 }} 
          transition={{ duration: 0.6, ease: [0.16, 1, 0.3, 1] }}
          className={`fixed top-0 w-full z-50 transition-all duration-300 border-b ${
            scrolled ? 'bg-bofBg/70 backdrop-blur-md border-white/[0.06] py-4' : 'bg-transparent border-transparent py-6'
          }`}
        >
          <div className="max-w-7xl mx-auto px-6 flex items-center justify-between">
            <a href="#" className="text-xl font-bold tracking-tighter">BOF MEDIA</a>
            <div className="hidden md:flex gap-8">
              {['Hizmetler', 'Süreç', 'Projeler', 'Hakkımda', 'İletişim'].map(item => (
                <a key={item} href={`#${item.toLowerCase()}`} className="text-sm text-bofMuted hover:text-white transition-colors duration-300">
                  {item}
                </a>
              ))}
            </div>
            <a href="#iletisim" className="bg-bofPrimary hover:bg-bofPrimary/90 text-white text-sm font-medium px-5 py-2.5 rounded-full transition-all shadow-lg shadow-bofPrimary/20">
              Ücretsiz Görüş
            </a>
          </div>
        </motion.nav>
      );
    };

    // ==========================================
    // 2. HERO BİLEŞENİ
    // ==========================================
    const Hero = () => {
      const cards = [
        { title: "KUŞADASI OTELİ", metric: "+38%", desc: "Daha fazla rezervasyon", tags: ["Mobil Uyumlu", "Google SEO", "2 Haftada Teslim"] },
        { title: "RESTORAN SİTESİ", metric: "+57%", desc: "Online rezervasyon artışı", tags: ["Hız Optimize", "QR Menü"] },
        { title: "AI MÜŞTERİ ASİSTANI", metric: "7/24", desc: "Otomatik cevap", tags: ["Otomasyon", "Entegrasyon"] }
      ];

      return (
        <section className="relative pt-44 pb-32 px-6 max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-16 items-center">
          {/* Hafif Işık Hüzmesi */}
          <div className="absolute top-1/4 left-1/4 -z-10 w-[600px] h-[300px] bg-bofPrimary/5 blur-[120px] rounded-full pointer-events-none" />
          
          {/* Sol Kısım */}
          <div className="lg:col-span-7 space-y-8">
            <motion.div 
              initial={{ opacity: 0, scale: 0.95 }} animate={{ opacity: 1, scale: 1 }} transition={{ duration: 0.5 }} 
              className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-white/[0.02] border border-white/[0.06] text-xs font-medium text-white/90 tracking-wide"
            >
              <span className="w-2 h-2 rounded-full bg-emerald-500" />
              ● Yeni proje kabul ediyorum
            </motion.div>
            
            <motion.h1 
              initial={{ opacity: 0, y: 30 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 0.8, ease: [0.16, 1, 0.3, 1] }} 
              className="text-5xl md:text-[80px] lg:text-[120px] font-bold tracking-tighter leading-[0.9] text-white"
            >
              Web Sitesinden Fazlası.<br/>İşletmenizi<br/>İnternette<br/>Büyüten<br/>
              <span className="text-bofPrimary">Dijital Deneyimler.</span>
            </motion.h1>
            
            <motion.p 
              initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 0.8, delay: 0.2 }} 
              className="text-lg md:text-xl text-bofMuted font-normal max-w-xl leading-relaxed"
            >
              Modern web siteleri, yapay zeka otomasyonları ve güçlü dijital deneyimler tasarlıyorum.
            </motion.p>
            
            <motion.div 
              initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 0.8, delay: 0.3 }} 
              className="flex flex-wrap gap-4 pt-4"
            >
              <a href="#projeler" className="bg-bofPrimary hover:bg-bofPrimary/90 text-white font-medium px-8 py-4 rounded-xl transition-all shadow-xl shadow-bofPrimary/10">
                Çalışmalarımı Gör
              </a>
              <a href="https://wa.me/1234567890" target="_blank" className="bg-transparent hover:bg-white/[0.02] border border-white/[0.08] text-white font-medium px-8 py-4 rounded-xl transition-all">
                WhatsApp'tan Yaz
              </a>
            </motion.div>
          </div>

          {/* Sağ Kısım - Metrik Kartları */}
          <div className="lg:col-span-5 space-y-5 relative">
            {cards.map((card, i) => (
              <motion.div 
                key={i} 
                initial={{ opacity: 0, x: 40 }} animate={{ opacity: 1, x: 0 }} 
                transition={{ duration: 0.8, delay: 0.2 + (i * 0.1), ease: [0.16, 1, 0.3, 1] }}
                whileHover={{ scale: 1.02, backgroundColor: 'rgba(255,255,255,0.02)' }}
                className="animate-subtle-float bg-white/[0.01] border border-white/[0.04] backdrop-blur-sm rounded-2xl p-6 flex items-center justify-between gap-6 transition-all duration-300"
                style={{ animationDelay: `${i * 1.5}s` }}
              >
                <div className="space-y-2">
                  <span className="text-[11px] font-bold tracking-widest text-bofMuted uppercase">{card.title}</span>
                  <p className="text-sm text-white/90 font-medium">{card.desc}</p>
                  <div className="flex flex-wrap gap-2 pt-1">
                    {card.tags.map(t => (
                      <span key={t} className="text-[10px] bg-white/[0.02] border border-white/[0.04] text-bofMuted px-2 py-0.5 rounded">{t}</span>
                    ))}
                  </div>
                </div>
                <div className="text-3xl font-bold tracking-tighter text-bofPrimary">{card.metric}</div>
              </motion.div>
            ))}
          </div>
        </section>
      );
    };

    // ==========================================
    // 3. GÜVEN (TRUST) BİLEŞENİ
    // ==========================================
    const Trust = () => {
      const features = [
        { icon: "⚡", title: "Hızlı Teslim" },
        { icon: "📱", title: "Mobil Uyumlu" },
        { icon: "🔍", title: "SEO Uyumlu" },
        { icon: "🤖", title: "Yapay Zeka Entegrasyonu" }
      ];
      return (
        <section id="hizmetler" className="py-32 px-6 max-w-7xl mx-auto border-t border-white/[0.04]">
          <h2 className="text-3xl md:text-5xl font-bold tracking-tight text-center mb-16">İşletmeler Neden BOF MEDIA'yı Seçiyor?</h2>
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            {features.map((f, i) => (
              <motion.div 
                key={i} 
                initial={{ opacity: 0, y: 20 }} whileInView={{ opacity: 1, y: 0 }} viewport={{ once: true }} 
                transition={{ duration: 0.6, delay: i * 0.1 }}
                whileHover={{ y: -4, borderColor: 'rgba(255,255,255,0.08)' }}
                className="bg-white/[0.01] border border-white/[0.03] rounded-2xl p-8 backdrop-blur-sm flex flex-col items-center text-center gap-4 transition-all"
              >
                <div className="text-2xl w-12 h-12 flex items-center justify-center rounded-xl bg-white/[0.02] border border-white/[0.05]">{f.icon}</div>
                <h3 className="text-lg font-medium tracking-tight text-white/90">{f.title}</h3>
              </motion.div>
            ))}
          </div>
        </section>
      );
    };

    // ==========================================
    // 4. PORTFOLYO BİLEŞENİ
    // ==========================================
    const Portfolio = () => {
      const projects = [
        { type: "OTEL", desc: "Lüks oteller için premium dönüşüm odaklı web deneyimi.", techs: ["React", "Tailwind", "Framer"], result: "+38% Rezervasyon Artışı" },
        { type: "RESTORAN", desc: "Menü ve online sipariş akışını optimize eden kurumsal arayüz.", techs: ["Next.js", "UI/UX"], result: "+57% Dijital Ciro" },
        { type: "AI OTOMASYON", desc: "Müşteri ilişkilerini otomatize eden yapay zeka altyapısı.", techs: ["Python", "OpenAI API"], result: "%40 Operasyon Tasarrufu" }
      ];
      return (
        <section id="projeler" className="py-32 border-t border-white/[0.04] w-full">
          <div className="max-w-7xl mx-auto px-6 mb-20">
            <h2 className="text-4xl md:text-5xl font-bold tracking-tight mb-4">Gerçek Sonuçlar.</h2>
            <p className="text-lg text-bofMuted max-w-xl leading-relaxed">
              Tasarladığım her proje estetik görünmek için değil, işletmeye müşteri kazandırmak için yapılır.
            </p>
          </div>
          <div className="max-w-7xl mx-auto px-6 space-y-12">
            {projects.map((p, i) => (
              <motion.div 
                key={i} 
                initial={{ opacity: 0, y: 30 }} whileInView={{ opacity: 1, y: 0 }} viewport={{ once: true }} transition={{ duration: 0.7 }}
                className="group grid grid-cols-1 lg:grid-cols-12 bg-white/[0.01] border border-white/[0.04] rounded-[2rem] overflow-hidden hover:border-white/[0.08] transition-all duration-300"
              >
                {/* Sol Görsel Alanı (Sahte mockup yok, mimari yapı) */}
                <div className="lg:col-span-7 p-12 bg-white/[0.015] flex items-center justify-center min-h-[400px] border-b lg:border-b-0 lg:border-r border-white/[0.04] relative">
                  <div className="absolute inset-0 bg-gradient-to-br from-bofPrimary/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500" />
                  <div className="w-full max-w-md h-full border border-white/[0.05] bg-bofBg rounded-xl p-6 shadow-2xl flex flex-col gap-4 relative z-10">
                     <div className="flex justify-between border-b border-white/[0.05] pb-4">
                       <div className="w-20 h-2 bg-white/[0.05] rounded-full"/>
                       <div className="w-8 h-2 bg-bofPrimary/20 rounded-full"/>
                     </div>
                     <div className="w-full h-3 bg-white/[0.03] rounded-full"/>
                     <div className="w-2/3 h-3 bg-white/[0.03] rounded-full"/>
                     <div className="flex-1 mt-4 bg-white/[0.01] border border-white/[0.04] rounded-lg flex items-center justify-center text-[10px] text-bofMuted font-mono uppercase tracking-widest">
                       [ {p.type} GERÇEK ARAYÜZ ]
                     </div>
                  </div>
                </div>
                {/* Sağ Bilgi Alanı */}
                <div className="lg:col-span-5 p-12 flex flex-col justify-center gap-6">
                  <span className="text-xs font-bold tracking-widest text-bofPrimary">{p.type}</span>
                  <p className="text-xl text-white/90 font-medium leading-relaxed">{p.desc}</p>
                  <div className="flex flex-wrap gap-2">
                    {p.techs.map(t => <span key={t} className="text-[11px] bg-white/[0.02] border border-white/[0.05] text-bofMuted px-3 py-1.5 rounded-full">{t}</span>)}
                  </div>
                  <div className="pt-6 border-t border-white/[0.04]">
                    <span className="text-xs text-bofMuted block mb-2 uppercase tracking-wider">Elde Edilen Sonuç</span>
                    <span className="text-2xl font-bold tracking-tight text-emerald-400">{p.result}</span>
                  </div>
                </div>
              </motion.div>
            ))}
          </div>
        </section>
      );
    };

    // ==========================================
    // 5. SÜREÇ BİLEŞENİ
    // ==========================================
    const Process = () => {
      const steps = [
        { num: "1", title: "Sizi Dinliyorum" },
        { num: "2", title: "Strateji Oluşturuyorum" },
        { num: "3", title: "Tasarlıyor ve Geliştiriyorum" },
        { num: "4", title: "Teslim ve Destek" }
      ];
      return (
        <section id="süreç" className="py-32 border-t border-white/[0.04] px-6">
          <div className="max-w-3xl mx-auto text-center">
            <h2 className="text-4xl font-bold tracking-tight mb-20">Nasıl Çalışıyorum?</h2>
            <div className="flex flex-col items-center gap-6">
              {steps.map((s, i) => (
                <React.Fragment key={i}>
                  <motion.div 
                    initial={{ opacity: 0, y: 20 }} whileInView={{ opacity: 1, y: 0 }} viewport={{ once: true, margin: "-50px" }} transition={{ duration: 0.5 }}
                    className="bg-white/[0.01] border border-white/[0.05] px-8 py-5 rounded-2xl w-full max-w-sm flex items-center justify-between backdrop-blur-sm"
                  >
                    <span className="text-bofPrimary font-bold text-xl">{s.num}</span>
                    <h3 className="text-lg font-medium text-white/90">{s.title}</h3>
                    <div className="w-4" /> {/* Spacer */}
                  </motion.div>
                  {i !== steps.length - 1 && (
                    <motion.div initial={{ opacity: 0 }} whileInView={{ opacity: 1 }} className="text-bofMuted/50 text-xl font-light">↓</motion.div>
                  )}
                </React.Fragment>
              ))}
            </div>
          </div>
        </section>
      );
    };

    // ==========================================
    // 6. HAKKIMDA BİLEŞENİ
    // ==========================================
    const About = () => {
      return (
        <section id="hakkımda" className="py-32 border-t border-white/[0.04] px-6">
          <div className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
            <motion.div initial={{ opacity: 0, x: -30 }} whileInView={{ opacity: 1, x: 0 }} viewport={{ once: true }} className="space-y-6">
              <h2 className="text-4xl md:text-5xl font-bold tracking-tight mb-8">Ben kimim?</h2>
              <p className="text-xl text-white font-medium leading-relaxed">
                BOF MEDIA'nın kurucusuyum.
              </p>
              <p className="text-lg text-bofMuted leading-relaxed">
                İşletmelerin internette daha profesyonel görünmesi ve daha fazla müşteri kazanması için modern web siteleri, yapay zeka çözümleri ve otomasyon sistemleri geliştiriyorum.
              </p>
            </motion.div>
            <motion.div initial={{ opacity: 0, scale: 0.95 }} whileInView={{ opacity: 1, scale: 1 }} viewport={{ once: true }} className="flex justify-center lg:justify-end">
              <div className="relative w-[300px] h-[300px] md:w-[400px] md:h-[400px] rounded-full border border-white/[0.05] bg-white/[0.01] flex items-center justify-center overflow-hidden">
                <div className="absolute inset-0 bg-gradient-to-br from-bofPrimary/10 to-transparent opacity-60" />
                <div className="text-bofMuted text-xs font-mono tracking-widest z-10">[ PROFİL FOTOĞRAFI ALANI ]</div>
              </div>
            </motion.div>
          </div>
        </section>
      );
    };

    // ==========================================
    // 7. CTA (ÇAĞRI) BİLEŞENİ
    // ==========================================
    const CTA = () => {
      return (
        <section className="py-40 relative border-t border-white/[0.04] overflow-hidden flex items-center justify-center text-center px-6">
          <div className="absolute inset-0 bg-bofPrimary/5 blur-[150px] -z-10" />
          <motion.div initial={{ opacity: 0, y: 30 }} whileInView={{ opacity: 1, y: 0 }} viewport={{ once: true }} className="max-w-4xl mx-auto space-y-12">
            <h2 className="text-4xl md:text-6xl font-bold tracking-tighter leading-[1.1] text-white">
              İşletmeniz İçin Sıradan Bir Web Sitesi Mi,<br/>Yoksa <br className="hidden md:block"/>
              <span className="text-bofPrimary">İnsanların Güvendiği Bir Marka Mı</span> İstiyorsunuz?
            </h2>
            <a href="#iletisim" className="inline-block bg-bofPrimary hover:bg-bofPrimary/90 text-white font-medium px-10 py-5 rounded-2xl text-lg transition-all shadow-2xl shadow-bofPrimary/20">
              Hemen İletişime Geç
            </a>
          </motion.div>
        </section>
      );
    };

    // ==========================================
    // 8. FOOTER BİLEŞENİ
    // ==========================================
    const Footer = () => {
      return (
        <footer id="iletisim" className="border-t border-white/[0.04] py-16 px-6 bg-white/[0.01]">
          <div className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-12 md:gap-8">
            <div className="md:col-span-2">
              <div className="text-2xl font-bold tracking-tighter mb-2">BOF MEDIA</div>
              <p className="text-sm text-bofMuted max-w-xs">İnternette Büyüten Dijital Deneyimler.</p>
            </div>
            <div className="flex flex-col gap-3">
              <span className="font-semibold text-white/90 mb-2">Hizmetler</span>
              <a href="#" className="text-sm text-bofMuted hover:text-white transition-colors">Web Sitesi</a>
              <a href="#" className="text-sm text-bofMuted hover:text-white transition-colors">AI Otomasyon</a>
              <a href="#" className="text-sm text-bofMuted hover:text-white transition-colors">Marka Tasarımı</a>
            </div>
            <div className="flex flex-col gap-3">
              <span className="font-semibold text-white/90 mb-2">İletişim</span>
              <a href="#" className="text-sm text-bofMuted hover:text-white transition-colors">Instagram</a>
              <a href="#" className="text-sm text-bofMuted hover:text-white transition-colors">LinkedIn</a>
              <a href="#" className="text-sm text-bofMuted hover:text-white transition-colors">WhatsApp</a>
              <a href="#" className="text-sm text-bofMuted hover:text-white transition-colors">Email</a>
            </div>
          </div>
          <div className="max-w-7xl mx-auto mt-16 pt-8 border-t border-white/[0.04] text-center md:text-left text-xs text-bofMuted">
            &copy; 2024 BOF MEDIA. Tüm hakları saklıdır.
          </div>
        </footer>
      );
    };

    // ==========================================
    // ANA UYGULAMA (APP) BİRLEŞTİRİCİSİ
    // ==========================================
    const App = () => {
      return (
        <div className="selection:bg-bofPrimary/30 selection:text-white">
          <Navbar />
          <Hero />
          <Trust />
          <Portfolio />
          <Process />
          <About />
          <CTA />
          <Footer />
        </div>
      );
    };

    // React'i DOM'a bas
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
