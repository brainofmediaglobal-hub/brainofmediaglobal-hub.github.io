<!DOCTYPE html>
<html lang="tr" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOF MEDIA | Premium Dijital Ajans</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { 
            bofBg: '#050816', 
            bofPrimary: '#3B5FFF', 
            bofMuted: '#8A90A5' 
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/framer-motion/11.3.31/framer-motion.min.js"></script>

  <style>
    body { 
      font-family: 'Inter', system-ui, sans-serif; 
      background-color: #050816; 
      color: #ffffff; 
      overflow-x: hidden; 
    }
    .glass {
      background: rgba(255,255,255,0.015);
      backdrop-filter: blur(20px);
    }
    .hero-text {
      font-size: clamp(3rem, 8vw, 7.2rem);
      line-height: 0.95;
      letter-spacing: -0.04em;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    const { useState, useEffect } = React;
    const { motion } = FramerMotion;

    // ====================== NAVBAR ======================
    function Navbar() {
      const [scrolled, setScrolled] = useState(false);

      useEffect(() => {
        const handleScroll = () => setScrolled(window.scrollY > 30);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      return React.createElement(motion.nav, {
        initial: { y: -80 },
        animate: { y: 0 },
        className: `fixed top-0 left-0 right-0 z-50 transition-all duration-500 ${scrolled ? 'py-5 bg-[#050816]/95 backdrop-blur-xl border-b border-white/5' : 'py-8 bg-transparent'}`
      },
        React.createElement('div', {
          className: "max-w-screen-2xl mx-auto px-8 flex items-center justify-between"
        },
          React.createElement('a', { href: "#", className: "text-2xl font-semibold tracking-tighter" }, "BOF MEDIA"),
          React.createElement('div', { className: "hidden md:flex items-center gap-10 text-sm font-medium" },
            ['Hizmetler', 'Süreç', 'Projeler', 'Hakkımda'].map(item => 
              React.createElement('a', {
                key: item,
                href: `#${item.toLowerCase()}`,
                className: "text-[#8A90A5] hover:text-white transition-colors"
              }, item)
            )
          ),
          React.createElement('a', {
            href: "#iletisim",
            className: "px-7 py-3.5 bg-[#3B5FFF] hover:bg-[#2e4fe6] rounded-2xl font-semibold text-sm transition-all"
          }, "Ücretsiz Görüş")
        )
      );
    }

    // ====================== HERO ======================
    function Hero() {
      const cards = [
        { title: "KUŞADASI OTELİ", metric: "+38%", desc: "Rezervasyon artışı", tags: ["Mobil Öncelikli", "SEO", "Hızlı Teslim"] },
        { title: "PREMIUM RESTORAN", metric: "+57%", desc: "Online sipariş artışı", tags: ["QR Menü", "Rezervasyon", "Hız Optimizasyonu"] },
        { title: "AI ASİSTAN", metric: "7/24", desc: "Otomatik müşteri desteği", tags: ["OpenAI", "Otomasyon"] }
      ];

      return React.createElement('section', {
        className: "relative min-h-screen pt-32 pb-24 flex items-center px-6 max-w-screen-2xl mx-auto"
      },
        React.createElement('div', { className: "grid grid-cols-1 lg:grid-cols-12 gap-16 lg:gap-20 items-center w-full" },
          // Sol taraf
          React.createElement('div', { className: "lg:col-span-7 space-y-10" },
            React.createElement('div', { className: "inline-flex items-center gap-3 px-5 py-2 rounded-3xl bg-white/5 border border-white/10" },
              React.createElement('div', { className: "w-2 h-2 rounded-full bg-emerald-500 animate-pulse" }),
              React.createElement('span', { className: "font-medium" }, "Yeni projeler kabul ediliyor")
            ),
            React.createElement('h1', {
              className: "hero-text font-semibold tracking-tighter leading-none"
            }, "Web sitesinden fazlası.\nİşletmenizi internette büyütüyoruz."),
            React.createElement('p', {
              className: "max-w-lg text-xl text-[#8A90A5]"
            }, "Premium dijital deneyimler ve yapay zeka çözümleriyle markanızı rakiplerinden ayırıyoruz."),
            React.createElement('div', { className: "flex flex-wrap gap-4" },
              React.createElement('a', {
                href: "#projeler",
                className: "px-10 py-5 bg-[#3B5FFF] hover:bg-[#2e4fe6] rounded-3xl font-semibold text-lg"
              }, "Projeleri İncele"),
              React.createElement('a', {
                href: "https://wa.me/905555555555",
                target: "_blank",
                className: "px-10 py-5 border border-white/20 hover:bg-white/5 rounded-3xl font-semibold text-lg"
              }, "WhatsApp'tan Yaz")
            )
          ),
          // Sağ kartlar
          React.createElement('div', { className: "lg:col-span-5 space-y-6" },
            cards.map((card, i) => 
              React.createElement(motion.div, {
                key: i,
                initial: { opacity: 0, y: 40 },
                animate: { opacity: 1, y: 0 },
                transition: { delay: 0.1 * i },
                whileHover: { y: -8 },
                className: "glass border border-white/10 rounded-3xl p-8"
              },
                React.createElement('div', { className: "flex justify-between items-start mb-6" },
                  React.createElement('div', null,
                    React.createElement('div', { className: "uppercase text-xs tracking-widest text-[#8A90A5]" }, card.title),
                    React.createElement('div', { className: "text-6xl font-bold text-[#3B5FFF] tracking-tighter" }, card.metric)
                  )
                ),
                React.createElement('p', { className: "text-white/90 mb-6" }, card.desc),
                React.createElement('div', { className: "flex flex-wrap gap-2" },
                  card.tags.map(tag => 
                    React.createElement('span', {
                      key: tag,
                      className: "text-xs px-4 py-1 bg-white/5 border border-white/10 rounded-2xl"
                    }, tag)
                  )
                )
              )
            )
          )
        )
      );
    }

    // ====================== ANA UYGULAMA ======================
    function App() {
      return React.createElement('div', { className: "min-h-screen bg-[#050816]" },
        React.createElement(Navbar),
        React.createElement(Hero)
        // Diğer bölümleri istersen ekleyebilirim, ama önce bu çalışsın
      );
    }

    // Render
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
